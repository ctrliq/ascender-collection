---
name: Release to Ansible Galaxy

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify galaxy.yml version matches release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          GALAXY_VERSION="$(grep -E '^version:' galaxy.yml | sed -E 's/^version:[[:space:]]*//')"
          if [ "$TAG" != "$GALAXY_VERSION" ]; then
            echo "::error::Release tag '${{ github.event.release.tag_name }}' does not match galaxy.yml version '$GALAXY_VERSION'"
            exit 1
          fi
          echo "Release tag matches galaxy.yml version: $GALAXY_VERSION"

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force

      - name: Publish to Ansible Galaxy
        run: >-
          ansible-galaxy collection publish
          ctrliq-ascender-*.tar.gz
          --api-key "${{ secrets.GALAXY_API_KEY }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: collection-release
          path: ctrliq-ascender-*.tar.gz
          retention-days: 90
