---
name: Ascender Collection CI

on:
  push:
    branches:
      - main
      - stable-*
  pull_request:
    branches:
      - main
      - stable-*
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }} / Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ansible-core 2.16 (minimum in meta/runtime.yml) — Python 3.10-3.12
          - ansible: stable-2.16
            python: "3.10"
          - ansible: stable-2.16
            python: "3.12"
          # ansible-core 2.17 — Python 3.10-3.12
          - ansible: stable-2.17
            python: "3.10"
          - ansible: stable-2.17
            python: "3.12"
          # ansible-core 2.18 — Python 3.11-3.13
          - ansible: stable-2.18
            python: "3.12"
          # ansible-core 2.19 — Python 3.11-3.13
          - ansible: stable-2.19
            python: "3.12"
          - ansible: stable-2.19
            python: "3.13"
          # ansible-core 2.20 — Python 3.11-3.13
          - ansible: stable-2.20
            python: "3.12"
          # ansible-core 2.21 — Python 3.12-3.13
          - ansible: stable-2.21
            python: "3.13"
    steps:
      - uses: ansible-community/ansible-test-gh-action@6ded727edb598e670ac056a8e680ca4050bac0a3  # v1.18.0
        with:
          ansible-core-version: ${{ matrix.ansible }}
          target-python-version: ${{ matrix.python }}
          testing-type: sanity

  build:
    name: Build & Galaxy import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build --force

      - name: Verify artifact exists
        run: ls -la ctrliq-ascender-*.tar.gz

      - name: Install galaxy-importer
        run: pip install galaxy-importer

      - name: Validate with galaxy-importer
        run: python -m galaxy_importer.main ctrliq-ascender-*.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: collection-artifact
          path: ctrliq-ascender-*.tar.gz
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core ruff yamllint ansible-lint

      - name: ruff — plugins
        run: ruff check plugins/

      - name: yamllint — meta and galaxy
        run: yamllint meta/ galaxy.yml

      - name: ansible-lint
        run: ansible-lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Checkout ascender (for Django models)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ctrliq/ascender
          path: ascender

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libldap2-dev \
            libsasl2-dev \
            libxml2-dev \
            libxmlsec1-dev \
            libxmlsec1-openssl \
            pkg-config

      - name: Install dependencies
        run: |
          pip install ansible-core
          pip install -r tests/unit/requirements.txt
          pip install -r ascender/requirements/requirements.txt
          pip install -r ascender/requirements/requirements_git.txt
          pip install -r ascender/requirements/requirements_dev.txt
          pip install -e ascender
          pip install -e ascender/awxkit

      - name: Run unit tests
        env:
          DJANGO_SETTINGS_MODULE: awx.main.tests.settings_for_test
        run: pytest tests/unit/ -v --nomigrations --reuse-db

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"

      - name: Install antsibull-changelog
        run: pip install antsibull-changelog

      - name: Lint changelog
        run: antsibull-changelog lint
