breaking_changes:
  - >-
    Renamed the collection from ``awx.awx`` to ``ctrliq.ascender``.
    Playbooks must update their fully-qualified module, plugin and
    doc-fragment names (for example ``awx.awx.job_launch`` becomes
    ``ctrliq.ascender.job_launch``). The collection now lives in its own
    repository at https://github.com/ctrliq/ascender-collection.
  - >-
    Raised the minimum required ansible-core to 2.16. The modules and
    plugins are now Python 3 only; the legacy ``six`` based Python 2
    compatibility shims have been removed.
  - >-
    Removed the long-deprecated ``tower_*`` module and plugin redirects
    (their announced removal date was 2022-01-23). Use the current
    ``ctrliq.ascender.*`` names instead.
