bugfixes:
  - credential - send an explicitly empty ``inputs`` dict to the API so stored inputs can be wiped; previously
    ``inputs={}`` was silently dropped.
  - credential_type - allow ``description``, ``inputs``, and ``injectors`` to be cleared by passing empty
    values; previously they were silently dropped and the old values kept.
  - credential_input_source - allow ``metadata`` and ``description`` to be cleared by passing empty values;
    previously they were silently dropped.
