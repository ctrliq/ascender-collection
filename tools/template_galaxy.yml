---
# Optional build playbook for producing a release artifact with the
# collection version and type injected into the Python source code.
#
# For most use cases, a plain `ansible-galaxy collection build` from the
# repo root is sufficient — it reads galaxy.yml directly.
#
# This playbook copies the source into build/, templates the version and
# namespace into the Python modules, and leaves the result ready for
# `ansible-galaxy collection build build/`.
- name: Template the collection for release
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    collection_package: ascender
    collection_namespace: ctrliq
    collection_version: "{{ lookup('file', playbook_dir + '/../galaxy.yml') | from_yaml | json_query('version') }}"
    collection_source: "{{ playbook_dir }}/../"
    collection_path: "{{ playbook_dir }}/../build"
  pre_tasks:
    - file:
        path: "{{ collection_path }}"
        state: absent

    - copy:
        src: "{{ collection_source }}"
        dest: "{{ collection_path }}"
        remote_src: true

  roles:
    - template_galaxy
